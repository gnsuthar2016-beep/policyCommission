<header class="app-header">
  <div class="header-container">
    <div class="header-brand">
      <h1>Shree Ram Associate</h1>
    </div>

    <div class="header-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
      <a routerLink="/policies" routerLinkActive="active" class="nav-link">Policies</a>
      <a routerLink="/customer-master" routerLinkActive="active" class="nav-link">Customers</a>
      <a routerLink="/reference-master" routerLinkActive="active" class="nav-link">References</a>
      <a routerLink="/misc-master" routerLinkActive="active" class="nav-link">Misc Master</a>
    </div>

    <div class="header-right">
      <div class="user-profile" *ngIf="user" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
        <button class="user-button">
          <span class="user-icon">👤</span>
          <span class="user-name">{{ user.name }}</span>
        </button>

        <div class="user-menu" *ngIf="showUserMenu">
          <div class="menu-header">
            <strong>{{ user.name }}</strong>
            <small>{{ user.email }}</small>
          </div>

          <div class="menu-divider"></div>

          <div class="session-info">
            <div class="info-item">
              <label>Session Started:</label>
              <span>{{ sessionStartTime }}</span>
            </div>
            <div class="info-item">
              <label>Session Duration:</label>
              <span>{{ sessionDuration }}</span>
            </div>
          </div>

          <div class="menu-divider"></div>

          <button class="logout-btn" (click)="logout()">
            🚪 Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
