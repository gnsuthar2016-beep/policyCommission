<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">SR</div>
      <div>
        <h1>Sign in</h1>
        <p>Access your account</p>
      </div>
    </div>

    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        Email
        <input type="email" formControlName="email" placeholder="you@example.com" [disabled]="isLoading" />
      </label>
      <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        Enter a valid email.
      </div>

      <label>
        Password
        <input type="password" formControlName="password" placeholder="••••••••" [disabled]="isLoading" />
      </label>
      <div class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
        Password is required (min 6 chars).
      </div>

      <button class="primary" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <div class="links">
      <a (click)="goTo('register')">Create account</a>
      <div style="display:flex;gap:8px">
        <a (click)="goTo('forgot-password')">Forgot?</a>
        <a (click)="goTo('change-password')">Change</a>
      </div>
    </div>
  </div>
</div>
