<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">SR</div>
      <div>
        <h1>Reset password</h1>
        <p>We will send a reset link to your email</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input formControlName="email" />
      </label>
      <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email.</div>
      <button class="primary" type="submit">Send reset link</button>
    </form>
    <div class="links"><a (click)="router.navigate([''])">Back to login</a></div>
  </div>
</div>
