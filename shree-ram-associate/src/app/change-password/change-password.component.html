<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">SR</div>
      <div>
        <h1>Change password</h1>
        <p>Securely update your password</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>Old password<input type="password" formControlName="oldPassword" /></label>
      <label>New password<input type="password" formControlName="newPassword" /></label>
      <label>Confirm password<input type="password" formControlName="confirm" /></label>
      <button class="primary" type="submit">Change password</button>
    </form>
    <div class="links"><a (click)="router.navigate([''])">Back to login</a></div>
  </div>
</div>
